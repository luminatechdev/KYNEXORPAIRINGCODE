<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KynexorTechnologies — Session Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background image with dark overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('https://files.catbox.moe/1fn0ou.png') center/cover no-repeat;
      z-index: -2;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      z-index: -1;
    }

    /* Glassy card */
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
      text-align: center;
    }

    /* Crown icon */
    .crown {
      font-size: 3rem;
      margin-bottom: 8px;
      display: block;
      filter: drop-shadow(0 0 16px rgba(200,160,255,0.6));
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #c8a0ff, #ff6ef7, #a0c8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      font-weight: 300;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a.btn {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 600;
      transition: all 0.25s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }

    a.btn.primary {
      background: linear-gradient(135deg, #9b59f5, #c844e0);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 20px rgba(155,89,245,0.35);
    }
    a.btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(155,89,245,0.5); }

    a.btn.secondary {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.85);
    }
    a.btn.secondary:hover { background: rgba(255,255,255,0.13); transform: translateY(-2px); }

    a.btn.ghost {
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 0.82rem;
      border-color: rgba(255,255,255,0.06);
    }
    a.btn.ghost:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.05); }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 8px 0;
    }

    .icon { font-size: 1.1rem; }

    .footer {
      margin-top: 24px;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="crown">👑</span>
    <h1>KynexorTechnologies</h1>
    <p class="subtitle">WhatsApp Bot Session Manager</p>

    <div class="btn-group">
      <a class="btn primary" href="/pair.html">
        <span class="icon">🔗</span> Pair New Session
      </a>
      <a class="btn secondary" href="/validate.html">
        <span class="icon">✅</span> Validate Session
      </a>
      <div class="divider"></div>
      <a class="btn ghost" href="https://github.com/sircylee/Queen_Kylie-V1" target="_blank">
        <span class="icon">📂</span> GitHub Repository
      </a>
      <a class="btn ghost" href="https://whatsapp.com/channel/0029Vb7DtMV9Bb5vhQyH1U05" target="_blank">
        <span class="icon">📣</span> WhatsApp Channel
      </a>
      <a class="btn ghost" href="https://chat.whatsapp.com/CIg2II8sxXIGooki9m4BQR" target="_blank">
        <span class="icon">💬</span> Support Group
      </a>
      <a class="btn ghost" href="/admin.html">
        <span class="icon">🔒</span> Admin Panel
      </a>
    </div>
  </div>
  <p class="footer">KynexorTechnologies &copy; 2025 — sircylee</p>
</body>
</html>
